name: Weekly Excel Generation with Sentry Monitoring (Every 2 Hours + Weekly)

permissions:
  contents: read

# Serialize runs per-ref. With timeout-minutes: 180 and a cron every ~2h
# (120min), a slow run could overlap with the next fire. cancel-in-progress:
# false (queue mode) is the safer choice for billing: a near-complete run
# must NEVER be cancelled right before hash_history.save / attachment
# upload finishes — overlapping fires queue instead. The bulk attribution
# prefetch (Phase 2 Plan 02) resolves all claimers in one RPC round-trip,
# keeping runs well under the cron interval. The 180min hard ceiling bounds
# how long a stuck run can hold the queue.
concurrency:
  group: weekly-excel-${{ github.ref }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 13,15,17,19,21,23,1 * * 1-5'
    - cron: '0 15,19,23 * * 0,6'
    - cron: '0 5 * * 1'
  workflow_dispatch:
    inputs:
      # Basic Operation Controls
      test_mode:
        description: 'Run in test mode (true/false)'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']
      force_generation:
        description: 'Force generate even if no eligible data'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']
      
      # Debug & Logging Mode
      debug_mode:
        description: 'Enable debug logging (per-cell, filter diagnostics, foreman diagnostics)'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']
      quiet_logging:
        description: 'Enable quiet logging (reduces output)'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']
      
      # Performance Settings
      use_discovery_cache:
        description: 'Use discovery cache for faster processing'
        required: false
        default: 'true'
        type: choice
        options: ['true','false']
      extended_change_detection:
        description: 'Enable extended change detection (includes foreman, dept, etc.)'
        required: false
        default: 'true'
        type: choice
        options: ['true','false']
      
      # Reset Options
      reset_hash_history:
        description: 'Reset hash history and regenerate all files'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']
      force_rediscovery:
        description: 'Force full sheet rediscovery (bypass discovery cache)'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']
      
      # Helper/Resiliency Grouping Mode
      res_grouping_mode:
        description: 'Grouping mode: both (primary + helper files), primary (only primary files), helper (only helper files)'
        required: false
        default: 'both'
        type: choice
        options: ['both', 'primary', 'helper']
      
      # Advanced Filters
      wr_filter:
        description: 'Comma-separated list of Work Request numbers to process (empty = all)'
        required: false
        default: ''
        type: string
      exclude_wrs:
        description: 'Comma-separated list of Work Request numbers to EXCLUDE from generation'
        required: false
        default: ''
        type: string
      advanced_options:
        description: 'Advanced: max_groups:X,regen_weeks:MMDDYY1;MMDDYY2,reset_wr_list:WR1;WR2,remediate_claimers:1,remediation_dry_run:1,remediation_window_weeks:26'
        required: false
        default: ''
        type: string
      parallel_workers:
        description: 'Number of parallel workers for data fetch & attachment pre-fetch (default 8)'
        required: false
        default: '8'
        type: string
      parallel_workers_discovery:
        description: 'Number of parallel workers for sheet discovery (default 8)'
        required: false
        default: '8'
        type: string

env:
  TZ: America/Chicago
  # Opt into Node.js 24 to silence deprecation warnings for actions still on Node.js 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  core:
    runs-on: ubuntu-latest
    # Hard ceiling for the Actions runner. Must exceed TIME_BUDGET_MINUTES
    # so the Python process exits gracefully before Actions kills it.
    # Raised to 3h (was 1h50m) 2026-05-26 for headroom; Phase 2 Plan 02
    # bulk attribution prefetch keeps normal runs well under the cron
    # interval. Reserve ~15 minutes for post-job cache/artifact steps
    # (TIME_BUDGET_MINUTES is pinned to 165 below).
    timeout-minutes: 180
    env:
      PYTHONUNBUFFERED: 1
      GITHUB_ACTIONS: 'true'
      SKIP_CELL_HISTORY: 'true'
      # Exposed at job level so the Sentry release step's `if:` can reliably
      # gate on its presence — step-level env is not guaranteed to be in scope
      # during that step's own `if:` evaluation.
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Compute Sentry release
        # Sentry release versions disallow slashes, so sanitize the
        # `owner/repo` form into `owner-repo` before composing the
        # release tag. This must run before any step that references
        # $SENTRY_RELEASE (Python job env below and the sentry-cli
        # release step further down) so both use an identical value.
        run: echo "SENTRY_RELEASE=${GITHUB_REPOSITORY//\//-}@${GITHUB_SHA}" >> "$GITHUB_ENV"
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      # Use restore/save split so caches persist even when the job times out or fails
      - name: Restore hash history cache
        uses: actions/cache/restore@v4
        with:
          path: generated_docs/hash_history.json
          key: hash-history-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            hash-history-${{ github.ref_name }}-
            hash-history-
      - name: Restore discovery cache
        uses: actions/cache/restore@v4
        with:
          path: generated_docs/discovery_cache.json
          key: discovery-cache-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            discovery-cache-${{ github.ref_name }}-
            discovery-cache-
      - name: Restore billing-audit row cache
        uses: actions/cache/restore@v4
        with:
          path: generated_docs/billing_audit_frozen_rows.json
          key: billing-audit-rows-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            billing-audit-rows-${{ github.ref_name }}-
            billing-audit-rows-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Determine execution type
        id: exec
        run: |
          day=$(TZ=America/Chicago date +%w)
          hour=$(TZ=America/Chicago date +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then t=manual
          elif [ $day -ge 1 ] && [ $day -le 5 ]; then t=production_frequent
          elif [ $day -eq 0 ] || [ $day -eq 6 ]; then t=weekend_maintenance
          else t=scheduled; fi
          if [ $day -eq 1 ] && [ $hour -eq 23 ]; then t=weekly_comprehensive; fi
          echo "execution_type=$t" >> $GITHUB_OUTPUT
          echo "should_run=true" >> $GITHUB_OUTPUT
      - name: Parse advanced options
        if: github.event.inputs.advanced_options != ''
        # Bind the untrusted dispatch input to an env var so the ${{ }}
        # expansion lands in the environment, NOT in the script text
        # (prevents shell/command injection — the value feeds the
        # destructive remediate_claimers path). All expansions quoted.
        env:
          ADVANCED_OPTIONS: ${{ github.event.inputs.advanced_options }}
        run: |
          echo "Parsing advanced options: ${ADVANCED_OPTIONS}"
          # Parse advanced_options format: max_groups:X,regen_weeks:MMDDYY1;MMDDYY2,reset_wr_list:WR1;WR2
          IFS=',' read -ra _ADV_OPTS <<< "${ADVANCED_OPTIONS}"
          for option in "${_ADV_OPTS[@]}"; do
            key="${option%%:*}"
            value="${option#*:}"
            case "$key" in
              max_groups) echo "MAX_GROUPS=${value}" >> "$GITHUB_ENV" ;;
              regen_weeks) echo "REGEN_WEEKS=$(echo "${value}" | tr ';' ',')" >> "$GITHUB_ENV" ;;
              reset_wr_list) echo "RESET_WR_LIST=$(echo "${value}" | tr ';' ',')" >> "$GITHUB_ENV" ;;
              remediate_claimers) echo "REMEDIATE_CLAIMERS=${value}" >> "$GITHUB_ENV" ;;
              remediation_dry_run) echo "REMEDIATION_DRY_RUN=${value}" >> "$GITHUB_ENV" ;;
              remediation_window_weeks) echo "REMEDIATION_WINDOW_WEEKS=${value}" >> "$GITHUB_ENV" ;;
            esac
          done
      - name: Generate reports
        if: steps.exec.outputs.should_run == 'true'
        env:
          SMARTSHEET_API_TOKEN: ${{ secrets.SMARTSHEET_API_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          ENVIRONMENT: production
          RELEASE: ${{ github.sha }}
          # SENTRY_RELEASE is exported slash-free via $GITHUB_ENV in the
          # "Compute Sentry release" step above so it satisfies Sentry's
          # version constraints and matches the tag used by the
          # sentry-cli release step below.
          EXECUTION_TYPE: ${{ steps.exec.outputs.execution_type }}
          # Billing audit attribution snapshot (shadow mode — writes
          # only; reader ships in follow-up PR). Writer no-ops
          # silently if either secret is unset, so this block is
          # safe to land before the secrets exist at the repo level.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          
          # Basic Operation Controls
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
          FORCE_GENERATION: ${{ github.event.inputs.force_generation || 'false' }}
          
          # Logging & Debug Controls (consolidated)
          QUIET_LOGGING: ${{ github.event.inputs.quiet_logging || 'false' }}
          PER_CELL_DEBUG_ENABLED: ${{ github.event.inputs.debug_mode || 'false' }}
          LOG_UNKNOWN_COLUMNS: ${{ github.event.inputs.debug_mode || 'false' }}
          FILTER_DIAGNOSTICS: ${{ github.event.inputs.debug_mode || 'false' }}
          FOREMAN_DIAGNOSTICS: ${{ github.event.inputs.debug_mode || 'false' }}
          
          # Performance & Caching
          USE_DISCOVERY_CACHE: ${{ github.event.inputs.use_discovery_cache || 'true' }}
          DISCOVERY_CACHE_TTL_MIN: '10080'
          FORCE_REDISCOVERY: ${{ github.event.inputs.force_rediscovery || 'false' }}
          SKIP_CELL_HISTORY: 'true'
          PARALLEL_WORKERS: ${{ github.event.inputs.parallel_workers || '8' }}
          PARALLEL_WORKERS_DISCOVERY: ${{ github.event.inputs.parallel_workers_discovery || '8' }}
          
          # Change Detection & History
          EXTENDED_CHANGE_DETECTION: ${{ github.event.inputs.extended_change_detection || 'true' }}
          HISTORY_SKIP_ENABLED: 'true'
          ATTACHMENT_REQUIRED_FOR_SKIP: 'true'
          KEEP_HISTORICAL_WEEKS: 'false'
          
          # Reset & Cleanup Options
          RESET_HASH_HISTORY: ${{ github.event.inputs.reset_hash_history || 'false' }}
          
          # Folder-based Sheet Discovery
          SUBCONTRACTOR_FOLDER_IDS: ${{ vars.SUBCONTRACTOR_FOLDER_IDS || '4232010517505924,2588197684307844' }}
          ORIGINAL_CONTRACT_FOLDER_IDS: ${{ vars.ORIGINAL_CONTRACT_FOLDER_IDS || '7644752003786628,8815193070299012' }}
          
          # Helper/Resiliency Grouping Mode
          RES_GROUPING_MODE: ${{ github.event.inputs.res_grouping_mode || 'both' }}
          
          # ─────────────────────────────────────────────────────────────
          # LEGACY: Python CSV-side rate recalc — RETIRED 2026-04-24.
          # ─────────────────────────────────────────────────────────────
          # Smartsheet now emits the authoritative Units Total Price
          # natively for sheets in ORIGINAL_CONTRACT_FOLDER_IDS
          # (7644752003786628, 8815193070299012) on rows whose
          # Snapshot Date >= 2026-04-12 and Units Completed? = true.
          # Running the Python recalc on top of Smartsheet's
          # authoritative price was a silent-corruption trap — see
          # CLAUDE.md Living Ledger entry [2026-04-24] for the full
          # incident write-up.
          #
          # These env vars are pinned to empty strings here so the
          # production workflow CANNOT pass through a stray value
          # from repo Variables. The Python code paths
          # (recalculate_row_price, _resolve_rate_recalc_cutoff_date,
          # build_cu_to_group_mapping, load_rate_versions) are
          # retained intentionally so re-enablement is a one-line
          # workflow revert, not a code rewrite.
          #
          # Revert path: replace each '' with the previous
          # ${{ vars.<NAME> || '' }} form. The Python
          # RATE_RECALC_SKIP_ORIGINAL_CONTRACT guard (default on)
          # still protects the two folders even if cutoff is
          # re-enabled, so a revert is safe by default.
          RATE_CUTOFF_DATE: ''
          NEW_RATES_CSV: ''
          OLD_RATES_CSV: ''

          # ─────────────────────────────────────────────────────
          # Phase 1: Subcontractor Rate Logic — workflow pinning
          # ─────────────────────────────────────────────────────
          # Pin Phase 1 feature defaults explicitly so the
          # operator-facing feature state is visible at the
          # workflow layer and a repo Variable cannot silently
          # override these without code review.
          #
          # Rollback path: set
          # ``SUBCONTRACTOR_RATE_VARIANTS_ENABLED: '0'`` to
          # disable ALL Phase 1 variant generation
          # (_AEPBillable, _ReducedSub, and their helper-shadow
          # twins). The existing primary / helper / vac_crew /
          # ORIG-folder pipelines are unaffected.
          #
          # Operator-actionable env vars and their meanings are
          # documented in ``website/docs/reference/environment.md``
          # — see the SUBCONTRACTOR_RATE_VARIANTS_ENABLED,
          # SUBCONTRACTOR_RATES_CSV, SUBCONTRACTOR_PPP_SHEET_ID,
          # and AEP_BILLABLE_CUTOFF sections. Workflow pinning
          # rationale: Living Ledger 2026-04-24 14:30 (the
          # retired CSV-side rate-recalc vars established this
          # pattern after a Variable-driven override caused a
          # silent regression).
          SUBCONTRACTOR_RATES_CSV: 'data/subcontractor_rates.csv'
          SUBCONTRACTOR_PPP_SHEET_ID: '8162920222379908'
          SUBCONTRACTOR_RATE_VARIANTS_ENABLED: '1'

          # ─────────────────────────────────────────────────────
          # Phase 1.1: Subcontractor Helper-Shadow Rescue + Variant
          # Partition + Claim-History Attribution — workflow pinning
          # ─────────────────────────────────────────────────────
          # Pin Phase 1.1 feature defaults explicitly so the
          # operator-facing feature state is visible at the workflow
          # layer and a repo Variable cannot silently override these
          # without code review (per CLAUDE.md [2026-04-24 14:30] /
          # [2026-05-15 12:00] rule 7).
          #
          # Rollback path: set
          # ``SUBCONTRACTOR_RATE_RECALC_PREACCEPTANCE_ENABLED: '0'``
          # to revert Bug A behavior to the pre-fix state. Helper rows
          # with blank SmartSheet ``Units Total Price`` will once again
          # drop at the row-acceptance gate at generate_weekly_pdfs.py
          # L3714, BEFORE helper detection runs. Does NOT affect Bug
          # B1 (variant partitioning), Bug B2 (PPP cleanup whitelist),
          # or Bug C (claim-history attribution) fixes.
          SUBCONTRACTOR_RATE_RECALC_PREACCEPTANCE_ENABLED: '1'

          SUBCONTRACTOR_HELPER_CLAIM_ATTRIBUTION_ENABLED: '1'
          # Phase 1.1 UAT gap closure (SUB-09 helper dimension): default-ON
          # kill switch for the one-time removal of pre-existing legacy
          # _Helper_<name> and bare-primary attachments on TARGET_SHEET_ID
          # for subcontractor WRs (pre-fix orphans from merged runs).
          # Task 1 of Plan 01.1-06 stops NEW duplicates; this switch
          # triggers the cleanup of OLD ones already on TARGET. Set to '0'
          # to skip the destructive cleanup and let the orphans persist
          # until manually removed. Living Ledger [2026-05-19].
          SUBCONTRACTOR_LEGACY_HELPER_CLEANUP_ENABLED: '1'
          # Rollback path: set to '0' to revert Bug C behavior to
          # Phase 1's full-row-set helper behavior. Helper file rows
          # will once again include every row where the CURRENT
          # `Foreman Helping?` column matches the helper's name
          # (instead of partitioning by frozen attribution from
          # `billing_audit.attribution_snapshot`). Does NOT affect
          # Bug A (pre-acceptance rescue), Bug B1 (variant
          # partitioning), or Bug B2 (PPP cleanup whitelist) fixes.
          # Required at merge time: confirm the data team has
          # deployed the `lookup_attribution(p_wr, p_week_ending,
          # p_smartsheet_row_id)` RPC in the `billing_audit` schema
          # (see .planning/phases/01.1-subcontractor-helper-shadow-
          # rescue/01.1-VALIDATION.md Manual-Only Verifications).

          # Subproject B (2026-05-20): default-ON kill switch for the
          # one-time removal of legacy UNPARTITIONED _ReducedSub /
          # _AEPBillable attachments (no _User_ token) on TARGET_SHEET_ID
          # and SUBCONTRACTOR_PPP_SHEET_ID for subcontractor WRs, once
          # those variants are re-partitioned by frozen primary claimer.
          # Set to '0' to skip the destructive cleanup (legacy duplicates
          # persist until removed manually). Separate from
          # SUBCONTRACTOR_HELPER_CLAIM_ATTRIBUTION_ENABLED (which gates
          # attribution resolution, not this cleanup). Living Ledger
          # [2026-05-20].
          SUBCONTRACTOR_LEGACY_PRIMARY_CLEANUP_ENABLED: '1'

          # Sub-project C (2026-05-21): kill switch for per-claimer
          # partitioning of _VacCrew Excel files by frozen vac-crew
          # claimer from billing_audit.attribution_snapshot. Set to
          # '0' to preserve legacy one-file-per-WR _VacCrew behavior.
          VAC_CREW_CLAIM_ATTRIBUTION_ENABLED: '1'
          # Sub-project C (2026-05-21): kill switch for the one-time
          # removal of legacy UNPARTITIONED _VacCrew attachments (no
          # _User_ token) on TARGET_SHEET_ID for vac-crew WRs. Set to
          # '0' to skip the destructive cleanup (legacy duplicates
          # persist until removed manually). Separate from
          # VAC_CREW_CLAIM_ATTRIBUTION_ENABLED (which gates attribution
          # resolution, NOT this cleanup). Living Ledger [2026-05-21].
          VAC_CREW_LEGACY_CLEANUP_ENABLED: '1'

          # Sub-project D (2026-05-25): kill switch for per-claimer
          # partitioning of the PRODUCTION primary Excel files by frozen
          # primary foreman from billing_audit.attribution_snapshot. Set
          # to '0' to preserve legacy one-file-per-WR bare primary
          # behavior. Unlike Subproject B, the core primary path never
          # holds on a Supabase outage — it falls back to the current
          # foreman and still generates. Living Ledger [2026-05-25].
          PRIMARY_CLAIM_ATTRIBUTION_ENABLED: '1'
          # Sub-project D (2026-05-25): kill switch for the one-time
          # removal of legacy UNPARTITIONED bare primary attachments (no
          # _User_ token) on TARGET_SHEET_ID for non-subcontractor WRs.
          # Set to '0' to skip the destructive cleanup (legacy duplicates
          # persist until removed manually). Separate from
          # PRIMARY_CLAIM_ATTRIBUTION_ENABLED (which gates attribution
          # resolution, NOT this cleanup). Living Ledger [2026-05-25].
          LEGACY_PRIMARY_PARTITION_CLEANUP_ENABLED: '1'

          # Sub-project E (2026-05-25, DORMANT SHIP): durable Supabase
          # change-detection hash store + clean (token-less) filenames.
          # WRITE on from day one — shadow-writes the per-group content
          # hash to billing_audit.group_content_hash every run (harmless
          # while not authoritative; just populates the durable store).
          # AUTHORITATIVE off — keeps the skip gate reading Supabase, the
          # _<timestamp>/_<hash> filename stripping, and the legacy
          # filename-hash cleanup short-circuit DISABLED until the store is
          # validated in production. OPERATOR PREREQUISITE before flipping
          # AUTHORITATIVE to '1' (and for shadow writes to land): apply
          # billing_audit/schema.sql (the group_content_hash table) to the
          # live Supabase project AND reload the PostgREST schema cache
          # (NOTIFY pgrst, 'reload schema';). Until then lookup_group_hash
          # returns 'unavailable' and the pipeline behaves exactly as today
          # (fail-safe to regenerate). Revert: set AUTHORITATIVE back to
          # '0'. Living Ledger [2026-05-25].
          SUPABASE_HASH_STORE_WRITE_ENABLED: '1'
          # REVERTED to '0' on 2026-05-26: with a near-empty
          # group_content_hash store, AUTHORITATIVE=1 forced regeneration of
          # historical (out-of-8-week-scope) groups whose claimer fell back to
          # the current foreman (#NO MATCH / blank) instead of the real frozen
          # claimer that exists in attribution_snapshot — producing
          # _User__NO_MATCH / _User_Unknown_Foreman files uploaded over real
          # historical attachments.
          #
          # RE-REVERTED to '0' on 2026-05-27: the Supabase RPC contract fix
          # (lookup_attribution multi-role + lookup_attribution_bulk deployed
          # 2026-05-27) restored correct claimer resolution where frozen data
          # exists, but a premature flip to '1' (commit 7077471) was made
          # BEFORE the runbook's remediation step. Run 26534649865 confirmed
          # ~147 clean-named _User__NO_MATCH / _User_Unknown_Foreman files were
          # regenerated for old weeks whose SOURCE rows have no valid foreman
          # (#NO MATCH / blank) — the exact failure mode this guard prevents.
          # FLIPPED to '1' on 2026-05-28 per operations.md runbook Step 3.
          # Preconditions verified before flip:
          #   (1) Supabase billing_audit.lookup_attribution 5-column
          #       multi-role contract + lookup_attribution_bulk RPC
          #       deployed 2026-05-27 (DROP-then-CREATE pattern; cache
          #       reloaded) and validated returning real frozen_primary /
          #       frozen_helper / frozen_vac_crew data — Living Ledger
          #       [2026-05-27 14:45];
          #   (2) billing_audit.group_content_hash table deployed and
          #       already populated by shadow writes (~2.3k rows
          #       accumulated since Sub-project E shipped dormant 2026-05-25);
          #   (3) attribution_snapshot healthy (~143k rows, 99.3% valid
          #       frozen_primary);
          #   (4) post-revert (cc968a8) test suite green
          #       (986 passed / 29 skipped / 69 subtests).
          # First post-flip dispatch should pass reset_hash_history: true
          # for the one-time full clean + correct regen. Subsequent cron
          # runs use the Supabase store as change-detection authority and
          # emit clean (token-less) filenames. Revert: set back to '0' per
          # operations.md Roll-back notes; token-named filenames resume,
          # shadow writes continue, no data loss.
          # Living Ledger [2026-05-28 12:09].
          SUPABASE_HASH_STORE_AUTHORITATIVE: '1'

          # Phase 2 Plan 03 / Plan 06: Garbage-claimer attachment remediation.
          # Activated via the advanced_options workflow_dispatch field:
          #   remediate_claimers:1,remediation_dry_run:1,remediation_window_weeks:26
          # The advanced_options parser (above) exports these to $GITHUB_ENV so
          # the Python process receives them. Python defaults keep a normal cron
          # run OFF and safe (REMEDIATE_CLAIMERS='0', REMEDIATION_DRY_RUN='1',
          # REMEDIATION_WINDOW_WEEKS='26') when advanced_options does not set them.
          # Literal step-env pins were removed (WR-02): a literal pin overrides
          # $GITHUB_ENV and would silently block the advanced_options path.

          # Phase 2 Plan 05 gap-closure (CR-01): on a MISSING
          # lookup_attribution_bulk RPC (PGRST202), degrade to per-row
          # lookup_attribution instead of HOLDing B/C/sub-helper billing files.
          # Default ON protects the deploy window automatically (the merge no
          # longer depends on operators deploying the RPC first). Set '0' to
          # force strict bulk-only. A transient outage still HOLDs (D-04).
          # Living Ledger 2026-05-26 gap-closure.
          ATTRIBUTION_BULK_PREFETCH_FALLBACK: '1'

          # AEP_BILLABLE_CUTOFF is intentionally UNSET in the
          # workflow — the Python default (datetime.date(2026,
          # 4, 12), the contract award date) is the source of
          # truth. Set this env var at the workflow level only
          # if a contract re-negotiation or retroactive billing
          # decision requires moving the cutoff. Format:
          # YYYY-MM-DD. Invalid values fail-safe to the default
          # with an error log. See Plan 01-11 / Living Ledger
          # 2026-05-15 for the safe-parse contract.

          # Advanced Filters
          WR_FILTER: ${{ github.event.inputs.wr_filter || '' }}
          # EXCLUDE_WRS: Manual input overrides repo variable; repo variable is persistent default
          EXCLUDE_WRS: ${{ github.event.inputs.exclude_wrs || vars.EXCLUDE_WRS || '' }}
          ADVANCED_OPTIONS: ${{ github.event.inputs.advanced_options || '' }}
          
          # Debug Limits (optimized for Actions)
          DEBUG_SAMPLE_ROWS: '1'
          DEBUG_ESSENTIAL_ROWS: '3'
          UNMAPPED_COLUMN_SAMPLE_LIMIT: '3'
          # Graceful Python budget: stop group processing before runner hard-kill.
          # Raised 2026-05-26 (95 -> 165) alongside timeout-minutes (110 -> 180):
          # keep Python execution within ~165 minutes, leaving ~15 minutes for
          # artifact/cache save + summary steps so end-to-end stays under 3h.
          # Must stay strictly below timeout-minutes by the post-job margin.
          TIME_BUDGET_MINUTES: '165'
        run: python generate_weekly_pdfs.py
      
      - name: Create Sentry release (optional)
        if: always() && env.SENTRY_AUTH_TOKEN != ''
        continue-on-error: true
        env:
          SENTRY_ORG: ${{ vars.SENTRY_ORG || '' }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_WORKFLOW || '' }}
        run: |
          # Sentry release versions cannot contain slashes; reuse the
          # sanitized SENTRY_RELEASE exported by the "Compute Sentry
          # release" step so the CLI-created release matches the tag
          # the Python process reports events against.
          RELEASE="$SENTRY_RELEASE"
          npx --yes @sentry/cli releases new "$RELEASE"
          npx --yes @sentry/cli releases set-commits "$RELEASE" --auto
          npx --yes @sentry/cli releases finalize "$RELEASE"
          npx --yes @sentry/cli releases deploys "$RELEASE" new -e production
      
      
      # ==================== ARTIFACT PRESERVATION SYSTEM ====================
      # Comprehensive artifact storage with organized naming, manifest generation,
      # and secure cloud storage following GitHub best practices
      # =====================================================================
      
      - name: Generate artifact manifest
        id: manifest
        if: always() && steps.exec.outputs.should_run == 'true'
        run: |
          echo "📦 Generating comprehensive artifact manifest..."
          
          # Count Excel files first (including week subfolders)
          excel_count=$(find generated_docs -name 'WR_*.xlsx' -type f 2>/dev/null | wc -l)
          echo "📊 Found $excel_count Excel files in generated_docs (including week subfolders)"
          
          python scripts/generate_artifact_manifest.py generated_docs artifact_manifest.json
          
          # Extract summary for workflow outputs
          if [ -f generated_docs/artifact_manifest.json ]; then
            total_files=$(jq -r '.summary.total_files // 0' generated_docs/artifact_manifest.json)
            total_size=$(jq -r '.summary.total_size_mb // 0' generated_docs/artifact_manifest.json)
            wr_count=$(jq -r '.summary.work_requests | length' generated_docs/artifact_manifest.json)
            week_count=$(jq -r '.summary.week_endings | length' generated_docs/artifact_manifest.json)
            
            echo "total_files=$total_files" >> $GITHUB_OUTPUT
            echo "total_size_mb=$total_size" >> $GITHUB_OUTPUT
            echo "wr_count=$wr_count" >> $GITHUB_OUTPUT
            echo "week_count=$week_count" >> $GITHUB_OUTPUT
            
            echo "✅ Manifest generated successfully"
            echo "   📊 Files: $total_files | Size: ${total_size}MB | WRs: $wr_count | Weeks: $week_count"
          else
            echo "⚠️ Manifest file not found"
            echo "total_files=0" >> $GITHUB_OUTPUT
          fi
      
      - name: Publish artifacts to Supabase
        id: publish_supabase
        if: always() && steps.exec.outputs.should_run == 'true'
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          ENVIRONMENT: production
          SENTRY_RELEASE: ${{ env.SENTRY_RELEASE }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python scripts/publish_artifacts_to_supabase.py generated_docs

      - name: Organize artifacts by Work Request
        id: organize
        if: always() && steps.exec.outputs.should_run == 'true'
        run: |
          echo "🗂️ Organizing artifacts by Work Request for easy discovery..."
          mkdir -p artifact_staging/by_wr artifact_staging/by_week artifact_staging/manifest
          
          # Copy manifest to dedicated folder
          if [ -f generated_docs/artifact_manifest.json ]; then
            cp generated_docs/artifact_manifest.json artifact_staging/manifest/
          fi
          
          # Organize Excel files by WR number for individual artifact uploads
          # Search in both root and week subfolders (YYYY-MM-DD pattern)
          file_count=0
          for file in $(find generated_docs -name 'WR_*.xlsx' -type f 2>/dev/null); do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              # Extract WR number from filename (format: WR_{number}_WeekEnding_...)
              wr_number=$(echo "$filename" | cut -d'_' -f2)
              week_ending=$(echo "$filename" | cut -d'_' -f4)
              
              # Create WR-specific folder
              mkdir -p "artifact_staging/by_wr/WR_${wr_number}"
              cp "$file" "artifact_staging/by_wr/WR_${wr_number}/"
              
              # Create week-specific folder
              mkdir -p "artifact_staging/by_week/Week_${week_ending}"
              cp "$file" "artifact_staging/by_week/Week_${week_ending}/"
              
              file_count=$((file_count + 1))
            fi
          done
          
          echo "📊 Found and organized $file_count Excel files"
          
          # Count organized artifacts
          wr_folders=$(find artifact_staging/by_wr -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l)
          week_folders=$(find artifact_staging/by_week -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l)
          
          echo "organized_wr_count=$wr_folders" >> $GITHUB_OUTPUT
          echo "organized_week_count=$week_folders" >> $GITHUB_OUTPUT
          echo "total_files_organized=$file_count" >> $GITHUB_OUTPUT
          echo "✅ Organized into $wr_folders WR folders and $week_folders week folders"
      
      - name: Upload comprehensive artifact bundle
        id: upload_bundle
        if: always() && steps.exec.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Excel-Reports-Complete-${{ steps.exec.outputs.execution_type }}-Run${{ github.run_number }}
          path: |
            generated_docs/**/WR_*.xlsx
            generated_docs/artifact_manifest.json
            generated_docs/hash_history.json
            generated_docs/audit_state.json
            generated_docs/run_summary.json
          retention-days: ${{ github.event.inputs.test_mode == 'true' && '30' || '90' }}
          compression-level: 6
          if-no-files-found: warn
          overwrite: true
      
      - name: Upload manifest artifact
        id: upload_manifest
        if: always() && steps.exec.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Manifest-${{ steps.exec.outputs.execution_type }}-Run${{ github.run_number }}
          path: artifact_staging/manifest/
          retention-days: 90
          compression-level: 9
          if-no-files-found: warn
      
      - name: Upload artifacts by Work Request
        id: upload_by_wr
        if: always() && steps.exec.outputs.should_run == 'true' && steps.organize.outputs.organized_wr_count > 0
        uses: actions/upload-artifact@v4
        with:
          name: By-WorkRequest-${{ steps.exec.outputs.execution_type }}-Run${{ github.run_number }}
          path: artifact_staging/by_wr/
          retention-days: ${{ github.event.inputs.test_mode == 'true' && '30' || '90' }}
          compression-level: 6
          if-no-files-found: warn
      
      - name: Upload artifacts by Week Ending
        id: upload_by_week
        if: always() && steps.exec.outputs.should_run == 'true' && steps.organize.outputs.organized_week_count > 0
        uses: actions/upload-artifact@v4
        with:
          name: By-WeekEnding-${{ steps.exec.outputs.execution_type }}-Run${{ github.run_number }}
          path: artifact_staging/by_week/
          retention-days: ${{ github.event.inputs.test_mode == 'true' && '30' || '90' }}
          compression-level: 6
          if-no-files-found: warn
      
      # ==================== ARTIFACT SUMMARY & VALIDATION ====================
      
      - name: Artifact preservation summary
        if: always() && steps.exec.outputs.should_run == 'true'
        run: |
          echo "# 📦 Artifact Preservation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Execution Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: ${{ steps.exec.outputs.execution_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run**: #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Mode**: ${{ github.event.inputs.test_mode }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Generated Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Files**: ${{ steps.manifest.outputs.total_files }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Size**: ${{ steps.manifest.outputs.total_size_mb }} MB" >> $GITHUB_STEP_SUMMARY
          echo "- **Work Requests**: ${{ steps.manifest.outputs.wr_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Week Endings**: ${{ steps.manifest.outputs.week_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Cloud Storage Organization" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts are preserved in GitHub's secure cloud storage with:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Complete Bundle**: All Excel reports with manifest and audit logs" >> $GITHUB_STEP_SUMMARY
          echo "- 🗂️ **By Work Request**: Organized folders for each WR number" >> $GITHUB_STEP_SUMMARY
          echo "- 📅 **By Week Ending**: Organized folders for each billing week" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 **Manifest**: Comprehensive JSON index with SHA256 validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Artifact Details" >> $GITHUB_STEP_SUMMARY
          if [ -f generated_docs/artifact_manifest.json ]; then
            echo "### Work Request Numbers" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            jq -r '.summary.work_requests | join(", ")' generated_docs/artifact_manifest.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            echo "### Week Endings" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            jq -r '.summary.week_endings | join(", ")' generated_docs/artifact_manifest.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "## Retention Policy" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.test_mode }}" == "true" ]; then
            echo "- **Test Mode**: 30 days retention" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Production**: 90 days retention (maximum)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Security**: Requires GitHub authentication to access" >> $GITHUB_STEP_SUMMARY
          echo "- **Validation**: SHA256 digest for each artifact" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Access Instructions" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts are available in the **Artifacts** section at the bottom of this workflow run." >> $GITHUB_STEP_SUMMARY
          echo "Download options:" >> $GITHUB_STEP_SUMMARY
          echo "1. **Complete Bundle** - All files in one download" >> $GITHUB_STEP_SUMMARY
          echo "2. **By Work Request** - Individual WR folders" >> $GITHUB_STEP_SUMMARY
          echo "3. **By Week Ending** - Weekly billing periods" >> $GITHUB_STEP_SUMMARY
          echo "4. **Manifest** - JSON index with file metadata" >> $GITHUB_STEP_SUMMARY
      
      # ==================== CACHE SAVE (runs even on timeout/failure) ====================
      - name: Save hash history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: generated_docs/hash_history.json
          key: hash-history-${{ github.ref_name }}-${{ github.run_id }}
      
      - name: Save discovery cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: generated_docs/discovery_cache.json
          key: discovery-cache-${{ github.ref_name }}-${{ github.run_id }}

      - name: Save billing-audit row cache
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: generated_docs/billing_audit_frozen_rows.json
          key: billing-audit-rows-${{ github.ref_name }}-${{ github.run_id }}
      
      - name: Summary
        if: always()
        run: |
          echo "============================================"
          echo "📊 WORKFLOW EXECUTION SUMMARY"
          echo "============================================"
          echo "Execution Type: ${{ steps.exec.outputs.execution_type }}"
          echo "Test Mode: ${{ github.event.inputs.test_mode }}"
          echo "Grouping Mode: ${{ github.event.inputs.res_grouping_mode || 'both' }}"
          echo ""
          echo "📦 ARTIFACT PRESERVATION:"
          echo "  Total Files: ${{ steps.manifest.outputs.total_files }}"
          echo "  Total Size: ${{ steps.manifest.outputs.total_size_mb }} MB"
          echo "  Work Requests: ${{ steps.manifest.outputs.wr_count }}"
          echo "  Week Endings: ${{ steps.manifest.outputs.week_count }}"
          echo ""
          echo "🗂️ ORGANIZATION:"
          echo "  Files Organized: ${{ steps.organize.outputs.total_files_organized }}"
          echo "  WR Folders: ${{ steps.organize.outputs.organized_wr_count }}"
          echo "  Week Folders: ${{ steps.organize.outputs.organized_week_count }}"
          echo ""
          if [ -d generated_docs ]; then 
            echo "📄 GENERATED FILES (including week subfolders):"
            find generated_docs -name 'WR_*.xlsx' -type f 2>/dev/null | head -n 25
          fi
          echo "============================================"
      
      # ==================== NOTION DASHBOARD SYNC ====================
      - name: Sync run to Notion
        if: always() && vars.NOTION_ENABLED == 'true'
        continue-on-error: true
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PIPELINE_DB: ${{ secrets.NOTION_PIPELINE_DB }}
          NOTION_CHANGELOG_DB: ${{ secrets.NOTION_CHANGELOG_DB }}
          NOTION_METRICS_DB: ${{ secrets.NOTION_METRICS_DB }}
          NOTION_INCIDENTS_DB: ${{ secrets.NOTION_INCIDENTS_DB }}
          EXECUTION_TYPE: ${{ steps.exec.outputs.execution_type }}
          JOB_STATUS: ${{ job.status }}
        run: |
          pip install -q "notion-client==2.2.1"
          # Load metrics from run_summary.json written by generate_weekly_pdfs.py
          if [ -f generated_docs/run_summary.json ]; then
            export FILES_GENERATED=$(jq -r '.files_generated // 0' generated_docs/run_summary.json)
            export FILES_UPLOADED=$(jq -r '.groups_uploaded // 0' generated_docs/run_summary.json)
            export FILES_SKIPPED=$(jq -r '.groups_skipped // 0' generated_docs/run_summary.json)
            export GROUPS_TOTAL=$(jq -r '.groups_total // 0' generated_docs/run_summary.json)
            export GROUPS_ERRORED=$(jq -r '.groups_errored // 0' generated_docs/run_summary.json)
            export SHEETS_DISCOVERED=$(jq -r '.sheets_discovered // 0' generated_docs/run_summary.json)
            export ROWS_FETCHED=$(jq -r '.rows_fetched // 0' generated_docs/run_summary.json)
            export DURATION_MINUTES=$(jq -r '.duration_minutes // 0' generated_docs/run_summary.json)
            export HASH_UPDATES=$(jq -r '.history_updates // 0' generated_docs/run_summary.json)
            export API_CALLS=$(jq -r '.api_calls // 0' generated_docs/run_summary.json)
            export AUDIT_RISK_LEVEL=$(jq -r '.audit_risk_level // "UNKNOWN"' generated_docs/run_summary.json)
          else
            echo "⚠️ run_summary.json not found — using defaults"
            export FILES_GENERATED="${{ steps.manifest.outputs.total_files || '0' }}"
          fi
          python scripts/notion_sync.py --mode run
