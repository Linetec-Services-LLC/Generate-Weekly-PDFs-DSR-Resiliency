name: Notify runbook

# ==============================================================================
# PURPOSE
#   After every push to this repo's default branch, sends a "release-note"
#   repository_dispatch to the Linetec runbook (runlog-linetec). The runbook's
#   receive-changelog.yml turns it into a tagged changelog blog post.
#
# REQUIRED SECRET
#   RUNBOOK_DISPATCH_PAT — fine-grained PAT:
#     - Resource owner: Linetec-Services-LLC
#     - Repository access: only runlog-linetec
#     - Permission: Contents (read/write)
# ==============================================================================

on:
  push:
    branches:
      - main
      - master

jobs:
  notify:
    # Only fire on the repo's default branch (works whether it's main or master)
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - name: Send release note to runbook
        env:
          RUNBOOK_DISPATCH_PAT: ${{ secrets.RUNBOOK_DISPATCH_PAT }}
          REPO_NAME: ${{ github.event.repository.name }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMPARE_URL: ${{ github.event.compare }}
        run: |
          set -euo pipefail

          # Fail fast with a clear message if the secret is missing,
          # instead of a cryptic 401 from the API.
          if [ -z "${RUNBOOK_DISPATCH_PAT:-}" ]; then
            echo "::error::RUNBOOK_DISPATCH_PAT secret is not set in this repository."
            exit 1
          fi

          # First line of the commit message becomes the changelog title
          title="$(printf '%s' "${COMMIT_MESSAGE:-Release update}" | head -n 1)"
          body="${COMMIT_MESSAGE:-Release update}"

          payload="$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg sha "$COMMIT_SHA" \
            --arg title "$title" \
            --arg body "$body" \
            --arg compare "${COMPARE_URL:-N/A}" \
            '{
              event_type: "release-note",
              client_payload: {
                repo: $repo,
                sha: $sha,
                title: $title,
                body: $body,
                compare_url: $compare
              }
            }')"

          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${RUNBOOK_DISPATCH_PAT}" \
            https://api.github.com/repos/Linetec-Services-LLC/runlog-linetec/dispatches \
            -d "$payload"