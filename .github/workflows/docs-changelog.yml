name: Docs — runbook changelog

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-changelog
  cancel-in-progress: false

jobs:
  append-entry:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Belt-and-suspenders loop protection: skip when this workflow itself
    # authored the triggering commit. GitHub also prevents GITHUB_TOKEN-
    # authored pushes from re-triggering push workflows, and our post-
    # generator short-circuits if only website/blog/ changed.
    if: github.actor != 'github-actions[bot]' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate runbook entry
        id: generate
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          log="$(mktemp)"
          python scripts/generate_runbook_entry.py | tee "$log"
          post_path="$(awk -F= '/^POST_PATH=/{print $2; exit}' "$log")"
          if [ -n "$post_path" ]; then
            printf 'post_path=%s\n' "$post_path" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute short SHA
        id: sha
        if: steps.generate.outputs.post_path != ''
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Commit runbook entry directly to master
        id: commit
        if: steps.generate.outputs.post_path != ''
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          SHORT_SHA: ${{ steps.sha.outputs.short }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage only the generated changelog post(s).
          git add website/blog/
          if git diff --cached --quiet; then
            echo "No staged runbook changes — nothing to commit."
            exit 0
          fi
          # Commit straight to the branch (master) with a [skip ci] marker.
          # This replaces the old per-commit create-pull-request flow, which
          # opened a PR on every push and never auto-merged them — they piled
          # up unbounded (36 stale stubs closed 2026-06-06). Loop protection:
          # the job-level `if: github.actor != 'github-actions[bot]'` guard
          # plus GitHub's rule that GITHUB_TOKEN-authored pushes do NOT
          # re-trigger push workflows means this commit cannot retrigger us.
          git commit -m "docs(runbook): log ${SHORT_SHA} [skip ci]"
          # Rebase-retry: a concurrent push to master would otherwise reject
          # us. Each entry is a unique NEW file under website/blog/, so the
          # rebase never conflicts.
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Runbook entry pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing onto latest ${GITHUB_REF_NAME} and retrying."
            git fetch origin "${GITHUB_REF_NAME}"
            git rebase "origin/${GITHUB_REF_NAME}"
          done
          echo "::error::Failed to push runbook entry after 5 attempts."
          exit 1

      - name: Summarize
        if: always()
        env:
          POST_PATH: ${{ steps.generate.outputs.post_path }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "${POST_PATH:-}" ]; then
            printf 'Committed runbook entry to %s: %s\n' "${REF_NAME}" "$POST_PATH" >> "$GITHUB_STEP_SUMMARY"
          else
            printf 'No runbook entry generated (empty diff, skip marker, or blog-only push).\n' >> "$GITHUB_STEP_SUMMARY"
          fi
